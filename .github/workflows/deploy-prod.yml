name: Deploy Production

on:
  push:
    branches: [master]

concurrency:
  group: deploy-prod
  cancel-in-progress: true

env:
  S3_BUCKET: chronas-lambda-deployments
  AWS_REGION: eu-west-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Generate build version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          COMMIT_SHA="${GITHUB_SHA::7}"
          COMMIT_MSG=$(git log -1 --pretty=%s)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > build-version.json << EOF
          {
            "version": "$VERSION",
            "commit": "$COMMIT_SHA",
            "commitMessage": "$COMMIT_MSG",
            "build": "$BUILD_DATE"
          }
          EOF
          echo "Deploying version $VERSION (commit $COMMIT_SHA)"
          cat build-version.json

      - name: Bump patch version
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          node -e "
            const fs = require('fs');
            const bv = JSON.parse(fs.readFileSync('build-version.json','utf8'));
            bv.version = '$NEW_VERSION';
            fs.writeFileSync('build-version.json', JSON.stringify(bv, null, 2));
          "
          echo "Bumped to $NEW_VERSION"

      - name: Configure AWS credentials
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }} --profile chronas-prod
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }} --profile chronas-prod
          aws configure set region ${{ env.AWS_REGION }} --profile chronas-prod

      - name: Get Lambda function name
        id: lambda
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name ChronasApiLambdaStackV2 \
            --region ${{ env.AWS_REGION }} \
            --profile chronas-prod \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaFunctionName'].OutputValue" \
            --output text)
          echo "function_name=$FUNCTION_NAME" >> $GITHUB_OUTPUT

      - name: Create deployment package
        run: |
          npm ci --omit=dev
          zip -r lambda-deployment.zip . \
            -x "*.git*" \
            -x "server/tests/*" \
            -x "PostmanTests/*" \
            -x "coverage/*" \
            -x "postman-results*" \
            -x "*.md" \
            -x "*.log" \
            -x ".github/*" \
            -x ".claude/*" \
            -x "eslint.config.js"
          echo "Package size: $(du -h lambda-deployment.zip | cut -f1)"

      - name: Ensure S3 bucket exists
        run: |
          aws s3 mb s3://${{ env.S3_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --profile chronas-prod 2>/dev/null || true

      - name: Deploy to Lambda via S3
        run: |
          S3_KEY="deploys/chronas-api-${GITHUB_SHA::7}.zip"
          aws s3 cp lambda-deployment.zip s3://${{ env.S3_BUCKET }}/$S3_KEY \
            --region ${{ env.AWS_REGION }} \
            --profile chronas-prod
          aws lambda update-function-code \
            --function-name ${{ steps.lambda.outputs.function_name }} \
            --s3-bucket ${{ env.S3_BUCKET }} \
            --s3-key $S3_KEY \
            --region ${{ env.AWS_REGION }} \
            --profile chronas-prod
          aws lambda wait function-updated \
            --function-name ${{ steps.lambda.outputs.function_name }} \
            --region ${{ env.AWS_REGION }} \
            --profile chronas-prod
          echo "Lambda deployment completed successfully!"

      - name: Push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $(node -p "require('./package.json').version") [skip ci]"
          git push
